name: README build

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests lxml python-dateutil

      - name: Update README file
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ewjinx
        run: python update_stats.py

      - name: Commit and Push Changes
        run: |-
          git config --global user.email "github-actions-bot@andrew6rant.github.io"
          git config --global user.name "Andrew6rant/GitHub-Actions-Bot"
          git add dark_mode.svg light_mode.svg cache/
          git commit -m "Updated README" -a || echo "No changes to commit"
          git push
