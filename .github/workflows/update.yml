name: Update Profile Stats SVGs

on:
  schedule:
    - cron: '0 0 * * *' # Triggers automatically every night at midnight
  workflow_dispatch: # Allows you to manually click a button to run it immediately

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Script to Generate SVGs
      run: python update_stats.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add dark_mode.svg light_mode.svg
        git diff-index --quiet HEAD || git commit -m "Automated daily stats update"
        git push
